<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="userStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    </head>

    <body>
        <nav>
            <ul>
                <h2><i class="fa-solid fa-dumbbell"></i>FitnessPro</h2>
                <p>Member Portal</p>
                <li><a href="User.html"> &nbsp; Dashboard</a></li>
                <li><a href="book.html">&nbsp; Book Classes</a></li>
                <li><a href="#">&nbsp; My Membership</a></li>
            </ul>
        </nav>
            <div class="wrapper">

            <div class="card">
                <div class="card-header">
                <h2>Upcoming Classes</h2>
                <a href="book.html">View All</a>
                </div>

            <div id="upcomingContent">
                <p style="color:#6b7280; font-size:14px; text-align:center; padding:20px;">Loading...</p>
            </div>
        </div>
            
        
            <section class="actions">
                <h2>Quick Actions</h2>

                <div class="qa-grid">
                    

                    


                    <div class="qa-card">
                    <div class="qa-icon">
                    <i class="fa-regular fa-calendar"></i>
                    </div>
                    <h3>Book a Class</h3>
                    <p >Reserve your spot in upcoming class</p>
                    </div>

                    <div class="qa-card">
                    <div class="qa-icon">
                    <i class="fa-regular fa-user"></i>
                    </div>
                    <h3>Membership</h3>
                    <p>View your membership</p>
                    </div>

                    <div class="qa-card">
                    <div class="qa-icon">
                    <i class="fa-solid fa-arrow-trend-up"></i>
                    </div>
                    <h3>Upgrade Plan</h3>
                    <p>Get more benefits</p>
                    </div>

                </div>
            </section>

        </div>

        <script>
    const API        = "http://localhost:5000/api";
    const USER_EMAIL = "member@gym.com";
 
    async function loadUpcoming() {
      const container = document.getElementById('upcomingContent');
      try {
        const res      = await fetch(`${API}/bookings/${USER_EMAIL}`);
        const bookings = await res.json();
 
        // Only show confirmed bookings
        const confirmed = bookings.filter(b => b.status === 'confirmed');
 
        if (confirmed.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="cal-icon">
                <div class="cal-top"></div>
                <div class="cal-body">
                  <div class="cal-line"></div>
                  <div class="cal-line short"></div>
                </div>
              </div>
              <p>No upcoming classes</p>
              <a href="book.html" class="browse-btn">Browse Classes</a>
            </div>`;
        } else {
          container.innerHTML = confirmed.map(b => `
            <div class="booking-row">
              <div class="booking-info">
                <span class="booking-badge badge-${b.category}">${b.category}</span>
                <p class="booking-name">${b.class_name}</p>
                <p class="booking-meta">📅 ${b.days} &nbsp; 🕐 ${b.time} &nbsp; 👤 ${b.trainer}</p>
              </div>
              <button class="cancel-btn" onclick="cancelBooking('${b._id}', this)">Cancel</button>
            </div>`).join('<hr class="divider">');
        }
      } catch (err) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="cal-icon">
              <div class="cal-top"></div>
              <div class="cal-body">
                <div class="cal-line"></div>
                <div class="cal-line short"></div>
              </div>
            </div>
            <p>No upcoming classes</p>
            <a href="book.html" class="browse-btn">Browse Classes</a>
          </div>`;
      }
    }
 
    async function cancelBooking(bookingId, btn) {
      if (!confirm('Cancel this booking?')) return;
      btn.textContent = 'Cancelling...';
      btn.disabled    = true;
 
      try {
        const res = await fetch(`${API}/bookings/${bookingId}`, { method: 'DELETE' });
        if (res.ok) loadUpcoming();
        else { btn.textContent = 'Error'; btn.disabled = false; }
      } catch {
        btn.textContent = 'Error';
        btn.disabled    = false;
      }
    }
 
    loadUpcoming();
  </script>




    </body>
</html>
